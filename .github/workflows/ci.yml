name: ci
run-name: Building and Pushing Docker Image
on: [push]
jobs:
  docker-build:
    runs-on: ubuntu-latest
    steps:
      - name: Login to Docker Hub
        uses: docker/login-action@v4
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}
      - run: echo "Building Docker image from ${{ github.ref_name }}"
      - name: Checkout repo
        uses: actions/checkout@v5
      - name: Build and tag docker image
        run: docker build -t nikitasreenath/nikisaunak:${{ github.ref_name }} .
      - name: Push docker image
        run: docker push nikitasreenath/niki-saunak:${{ github.sha }}
