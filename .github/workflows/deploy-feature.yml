name: feature
run-name: Building and Pushing Docker Image
on: [push]

jobs:
  docker-build-push:
    runs-on: ubuntu-latest
    steps:
      - name: Login to Docker Hub
        uses: docker/login-action@v4
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}
      - run: echo "Building Docker image from ${{ github.sha }}"
      - name: Checkout repo
        uses: actions/checkout@v5
      - name: Build and tag docker image
        run: docker build -t nikitasreenath/nikisaunak:${{ github.sha }} .
      - name: Push docker image
        run: docker push nikitasreenath/nikisaunak:${{ github.sha }}
  
  deploy-new-image:
    needs: docker-build-push
    runs-on: ubuntu-latest
    steps:
      - run: echo "SSH into Droplet"
      - name: Login to Droplet
        uses: appleboy/ssh-action@v1
        with:
          host: ${{ secrets.HOST }}
          username: ${{ secrets.SSH_USERNAME }}
          key: ${{ secrets.SSH_KEY }}
          port: ${{ secrets.SSH_PORT }}
          script: |
            docker pull nikitasreenath/nikisaunak:${{ github.sha }}
            docker image list
            docker ps -aq | xargs docker rm -f
            docker run -d --restart unless-stopped --name niki-saunak-frontend -p 8080:80 nikitasreenath/nikisaunak:${{ github.sha }}
