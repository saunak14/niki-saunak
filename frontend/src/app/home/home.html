<div class="container-lg py-5">
  <div class="mb-5">
    <h2 class="widgets-heading">OUR corner of the internet</h2>
    <p class="widgets-subheading">A collection of fun things made for us ✨</p>
  </div>

  <div class="row g-4">
    @for (widget of widgets; track widget.name) {
      <div class="col-12 col-sm-6 col-lg-4">
        <div
          class="widget-card"
          [class.widget-card--active]="widget.active"
          (click)="navigate(widget)"
          [attr.role]="widget.active ? 'button' : null"
          [attr.tabindex]="widget.active ? '0' : null"
          (keydown.enter)="navigate(widget)"
        >
          <div class="widget-icon">{{ widget.icon }}</div>
          <div class="widget-body">
            <h5 class="widget-name">{{ widget.name }}</h5>
            <p class="widget-desc">{{ widget.desc }}</p>
          </div>
          <div class="widget-footer">
            @if (widget.active) {
              <span class="badge-play">Play</span>
            } @else {
              <span class="badge-soon">Coming Soon</span>
            }
          </div>
        </div>
      </div>
    }
  </div>
</div>
