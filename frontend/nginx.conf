server {
    listen 80;
    root /usr/share/nginx/html;
    index index.html;

    # Angular SPA routing: serve index.html for all app routes
    location / {
        try_files $uri $uri/ /index.html;
    }

    # Never cache index.html — must pick up new deploys immediately
    location = /index.html {
        add_header Cache-Control "no-cache, no-store, must-revalidate";
    }

    # Cache all other static assets for 1 year (Angular content-hashes their names)
    location ~* \.(js|css|png|jpg|jpeg|gif|ico|svg|woff|woff2|ttf|eot)$ {
        expires 1y;
        add_header Cache-Control "public, immutable";
    }

    # Gzip compression (cuts JS/CSS transfer by ~70%)
    gzip on;
    gzip_vary on;
    gzip_min_length 1024;
    gzip_types
        text/plain text/css text/xml text/javascript
        application/javascript application/json application/xml
        image/svg+xml;
}
